<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-color:#f8f9fa;
        }

        .dashboard-card{
            border:1px solid #ddd;
            border-radius:8px;
            padding:20px;
            background:white;
            text-align:center;
            box-shadow:0px 2px 5px rgba(0,0,0,0.1);
        }

        .dashboard-number{
            font-size:40px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <!-- Navbar -->

    <div class="d-flex justify-content-end mb-4">

        <a href="/dashboard" class="btn btn-primary me-2">
            Dashboard
        </a>

        <a href="/add-enquiry" class="btn btn-light me-2">
            Add Enquiry
        </a>

        <a href="/view-enquiries" class="btn btn-light me-2">
            View Enquiries
        </a>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>


    <!-- Heading -->

    <h2 class="text-center mb-5">
        📊 Enquiry Dashboard
    </h2>


    <!-- Dashboard Cards -->

    <div class="row">

        <!-- Total -->

        <div class="col-md-3">

            <div class="dashboard-card">

                <h5>Total Enquiries</h5>

                <div class="dashboard-number text-primary"
                     th:text="${dashboardInfo.totalEnquiries}">
                </div>

            </div>

        </div>


        <!-- New -->

        <div class="col-md-3">

            <div class="dashboard-card">

                <h5>New Enquiries</h5>

                <div class="dashboard-number text-success"
                     th:text="${dashboardInfo.newEnquiries}">
                </div>

            </div>

        </div>


        <!-- Enrolled -->

        <div class="col-md-3">

            <div class="dashboard-card">

                <h5>Enrolled</h5>

                <div class="dashboard-number text-info"
                     th:text="${dashboardInfo.enrolledEnquiries}">
                </div>

            </div>

        </div>


        <!-- Lost -->

        <div class="col-md-3">

            <div class="dashboard-card">

                <h5>Lost Enquiries</h5>

                <div class="dashboard-number text-danger"
                     th:text="${dashboardInfo.lostEnquiries}">
                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
