<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Enquiries</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-color:#f8f9fa;
        }

        .table thead{
            background-color:black;
            color:white;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <!-- Navbar -->

    <div class="d-flex justify-content-end mb-5">

        <a href="/dashboard" class="btn btn-primary me-2">
            Dashboard
        </a>

        <a href="/add-enquiry" class="btn btn-light me-2">
            Add Enquiry
        </a>

        <a href="/view-enquiries" class="btn btn-light me-2">
            View Enquiries
        </a>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>


    <!-- Heading -->

    <h1 class="text-center mb-5">
        View Enquries
    </h1>


    <!-- Filter Form -->

    <form>

        <div class="row mb-4">

            <!-- Class Mode -->

            <div class="col-md-3">

                <label>Select Class Mode :</label>

                <select class="form-select">

                    <option value="">
                        -Select-
                    </option>

                    <option value="Online">
                        Online
                    </option>

                    <option value="Offline">
                        Offline
                    </option>

                </select>

            </div>


            <!-- Course -->

            <div class="col-md-3">

                <label>Select Course :</label>

                <select class="form-select">

                    <option value="">
                        -Select-
                    </option>

                    <option th:each="course : ${courses}"
                            th:value="${course.courseId}"
                            th:text="${course.courseName}">
                    </option>

                </select>

            </div>


            <!-- Status -->

            <div class="col-md-3">

                <label>Select Enq Status :</label>

                <select class="form-select">

                    <option value="">
                        -Select-
                    </option>

                    <option value="NEW">
                        NEW
                    </option>

                    <option value="ENROLLED">
                        ENROLLED
                    </option>

                    <option value="LOST">
                        LOST
                    </option>

                </select>

            </div>


            <!-- Button -->

            <div class="col-md-3 mt-4">

                <button class="btn btn-primary">
                    Filter
                </button>

            </div>

        </div>

    </form>


    <!-- Table -->

    <table class="table table-bordered">

        <thead>

        <tr>

            <th>S.No</th>
            <th>Student Name</th>
            <th>Student Phno</th>
            <th>Course</th>
            <th>Class Mode</th>
            <th>Enq Status</th>
			<th>Action</th>

        </tr>

        </thead>


        <tbody>

        <tr th:each="enq, loopCounter : ${enquiries}">

            <td th:text="${loopCounter.index+1}"></td>

            <td th:text="${enq.name}"></td>

            <td th:text="${enq.phoneNumber}"></td>

            <td th:text="${enq.course.courseName}"></td>

            <td th:text="${enq.classMode}"></td>

            <td th:text="${enq.status}"></td>
			<td>
				<a th:href="@{/edit-enq(enqId=${enq.enqId})}"
				   class="btn btn-sm btn-primary">
				    Edit
				</a>
			</td>

        </tr>


        <tr th:if="${enquiries.size()==0}">

            <td colspan="6" class="text-center">
                No Records Found
            </td>

        </tr>

        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
