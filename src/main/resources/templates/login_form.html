<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-color:#f3f6fb;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{

            width:400px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0px 4px 15px rgba(0,0,0,0.1);

        }

        .login-title{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
            color:#0d6efd;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <h2 class="login-title">
        Counsellor Login
    </h2>

    <form th:action="@{/login}"
          th:object="${counsellor}"
          method="post">

        <!-- Email -->

        <div class="mb-3">

            <label class="form-label">
                Email Address
            </label>

            <input type="email"
                   th:field="*{email}"
                   class="form-control"
                   placeholder="Enter your email"
                   required>

        </div>


        <!-- Password -->

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <input type="password"
                   th:field="*{password}"
                   class="form-control"
                   placeholder="Enter your password"
                   required>

        </div>


        <!-- Button -->

        <div class="d-grid">

            <input type="submit"
                   value="Login"
                   class="btn btn-primary">

        </div>

    </form>


    <!-- Register Link -->

    <div class="register-link">

        <a href="/register">
            Click Here To Register
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
